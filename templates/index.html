<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoML Studio</title>
<meta name="description" content="Upload a dataset, pick a model, and download a trained file — no code required.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0d13;
    --bg-card: rgba(255, 255, 255, 0.045);
    --border: rgba(255, 255, 255, 0.09);
    --text: #f2f5f8;
    --text-dim: rgba(242, 245, 248, 0.6);
    --teal: #5eead4;
    --amber: #f5b26b;
    --violet: #a78bfa;
    --radius-lg: 20px;
    --radius-pill: 999px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- animated background layer ---- */
  .waves-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  .waves-bg canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .vignette {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 60% 50% at 50% 38%, rgba(10, 13, 19, 0) 0%, rgba(10, 13, 19, 0.55) 100%),
      linear-gradient(to bottom, rgba(10, 13, 19, 0.65) 0%, rgba(10, 13, 19, 0) 20%, rgba(10, 13, 19, 0) 78%, rgba(10, 13, 19, 0.8) 100%);
  }

  /* ---- hero ---- */
  .hero {
    position: relative;
    z-index: 1;
    min-height: 50vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6rem 1.5rem 4rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
    border: 1px solid rgba(94, 234, 212, 0.35);
    background: rgba(94, 234, 212, 0.06);
    padding: 0.5rem 1.1rem;
    border-radius: var(--radius-pill);
    margin-bottom: 2rem;
    backdrop-filter: blur(6px);
  }
  .badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    line-height: 1.08;
    letter-spacing: -0.02em;
    margin: 0 0 1.5rem;
    max-width: 16ch;
  }

  .hero p {
    font-size: 1.5rem;
    line-height: 1.6;
    color: var(--text-dim);
    max-width: 36ch;
    margin: 0 0 2.5rem;
  }

  .cta {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    color: #0a0d13;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.9rem 1.8rem;
    border-radius: var(--radius-pill);
    background: linear-gradient(100deg, var(--teal), var(--violet));
    box-shadow: 0 8px 30px -8px rgba(94, 234, 212, 0.35);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .cta .arrow { transition: transform 0.25s ease; }
  .cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 34px -6px rgba(167, 139, 250, 0.45);
  }
  .cta:hover .arrow { transform: translateX(4px); }
  .cta:focus-visible {
    outline: 2px solid var(--teal);
    outline-offset: 3px;
  }

  /* ---- feature grid ---- */
  .feature-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.25rem;
    max-width: 1040px;
    margin: 0 auto;
    padding: 0 1.5rem 6rem;
  }

  .feature-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.75rem 1.5rem;
    backdrop-filter: blur(14px);
    transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
  }
  .feature-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 255, 255, 0.18);
    background: rgba(255, 255, 255, 0.065);
  }

  .feature-card .num {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    margin-bottom: 0.85rem;
  }
  .feature-card:nth-child(1) .num, .feature-card:nth-child(1) .icon { color: var(--teal); }
  .feature-card:nth-child(2) .num, .feature-card:nth-child(2) .icon { color: var(--amber); }
  .feature-card:nth-child(3) .num, .feature-card:nth-child(3) .icon { color: var(--violet); }

  .feature-card .icon {
    width: 50px;
    height: 50px;
    margin-bottom: 1rem;
  }
  .feature-card .icon svg { width: 100%; height: 100%; }

  .feature-card .title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    margin: 0 0 0.4rem;
  }
  .feature-card .desc {
    font-size: 0.9rem;
    color: var(--text-dim);
    margin: 0;
    line-height: 1.5;
  }

  @media (max-width: 760px) {
    .feature-grid { grid-template-columns: 1fr; }
    .hero { padding: 5rem 1.25rem 3rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .cta, .feature-card { transition: none; }
  }
</style>
</head>
<body>

  <div id="waves-bg" class="waves-bg" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <main class="hero">
    <div class="badge"><span class="dot"></span>No code required</div>
    <h1>Build ML models<br>without writing code</h1>
    <p>Upload a dataset, pick a model, and download<br>a trained file.</p>
    <a href="{{ url_for('upload') }}" class="cta">Get started <span class="arrow">→</span></a>
  </main>

  <section class="feature-grid">
    <div class="feature-card">
      <span class="num">01</span>
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 16V4M12 4l-4 4M12 4l4 4"/>
          <path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3"/>
        </svg>
      </div>
      <p class="title">Upload data</p>
      <p class="desc">CSV or Excel, any size</p>
    </div>

    <div class="feature-card">
      <span class="num">02</span>
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="6" x2="20" y2="6"/><circle cx="9" cy="6" r="2"/>
          <line x1="4" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="2"/>
          <line x1="4" y1="18" x2="20" y2="18"/><circle cx="7" cy="18" r="2"/>
        </svg>
      </div>
      <p class="title">Configure</p>
      <p class="desc">Pick target and model</p>
    </div>

    <div class="feature-card">
      <span class="num">03</span>
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 8l-9-5-9 5 9 5 9-5z"/>
          <path d="M3 8v8l9 5 9-5V8"/>
          <path d="M12 13v8"/>
        </svg>
      </div>
      <p class="title">Train and export</p>
      <p class="desc">Get a ready .pkl file</p>
    </div>
  </section>

<script type="module">
import { Renderer, Program, Mesh, Triangle } from 'https://esm.sh/ogl@1.0.11';

function hexToVec3(hex) {
  const h = hex.replace('#', '');
  return [
    parseInt(h.slice(0, 2), 16) / 255,
    parseInt(h.slice(2, 4), 16) / 255,
    parseInt(h.slice(4, 6), 16) / 255
  ];
}

const config = {
  speed: 0.4,
  innerLineCount: 32.0,
  outerLineCount: 36.0,
  warpIntensity: 1.0,
  rotation: -44,
  edgeFadeWidth: 0.0,
  colorCycleSpeed: 1.0,
  brightness: 0.2,
  color1: '#0b5bd9',
  color2: '#030000',
  color3: '#ffffff',
  enableMouseInteraction: true,
  mouseInfluence: 2.0
};

const vertexShader = `
attribute vec2 uv;
attribute vec2 position;
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position, 0, 1);
}
`;

const fragmentShader = `
precision highp float;

uniform float uTime;
uniform vec3 uResolution;
uniform float uSpeed;
uniform float uInnerLines;
uniform float uOuterLines;
uniform float uWarpIntensity;
uniform float uRotation;
uniform float uEdgeFadeWidth;
uniform float uColorCycleSpeed;
uniform float uBrightness;
uniform vec3 uColor1;
uniform vec3 uColor2;
uniform vec3 uColor3;
uniform vec2 uMouse;
uniform float uMouseInfluence;
uniform bool uEnableMouse;

#define HALF_PI 1.5707963

float hashF(float n) {
  return fract(sin(n * 127.1) * 43758.5453123);
}

float smoothNoise(float x) {
  float i = floor(x);
  float f = fract(x);
  float u = f * f * (3.0 - 2.0 * f);
  return mix(hashF(i), hashF(i + 1.0), u);
}

float displaceA(float coord, float t) {
  float result = sin(coord * 2.123) * 0.2;
  result += sin(coord * 3.234 + t * 4.345) * 0.1;
  result += sin(coord * 0.589 + t * 0.934) * 0.5;
  return result;
}

float displaceB(float coord, float t) {
  float result = sin(coord * 1.345) * 0.3;
  result += sin(coord * 2.734 + t * 3.345) * 0.2;
  result += sin(coord * 0.189 + t * 0.934) * 0.3;
  return result;
}

vec2 rotate2D(vec2 p, float angle) {
  float c = cos(angle);
  float s = sin(angle);
  return vec2(p.x * c - p.y * s, p.x * s + p.y * c);
}

void main() {
  vec2 coords = gl_FragCoord.xy / uResolution.xy;
  coords = coords * 2.0 - 1.0;
  coords = rotate2D(coords, uRotation);

  float halfT = uTime * uSpeed * 0.5;
  float fullT = uTime * uSpeed;

  float mouseWarp = 0.0;
  if (uEnableMouse) {
    vec2 mPos = rotate2D(uMouse * 2.0 - 1.0, uRotation);
    float mDist = length(coords - mPos);
    mouseWarp = uMouseInfluence * exp(-mDist * mDist * 4.0);
  }

  float warpAx = coords.x + displaceA(coords.y, halfT) * uWarpIntensity + mouseWarp;
  float warpAy = coords.y - displaceA(coords.x * cos(fullT) * 1.235, halfT) * uWarpIntensity;
  float warpBx = coords.x + displaceB(coords.y, halfT) * uWarpIntensity + mouseWarp;
  float warpBy = coords.y - displaceB(coords.x * sin(fullT) * 1.235, halfT) * uWarpIntensity;

  vec2 fieldA = vec2(warpAx, warpAy);
  vec2 fieldB = vec2(warpBx, warpBy);
  vec2 blended = mix(fieldA, fieldB, mix(fieldA, fieldB, 0.5));

  float fadeTop = smoothstep(uEdgeFadeWidth, uEdgeFadeWidth + 0.4, blended.y);
  float fadeBottom = smoothstep(-uEdgeFadeWidth, -(uEdgeFadeWidth + 0.4), blended.y);
  float vMask = 1.0 - max(fadeTop, fadeBottom);

  float tileCount = mix(uOuterLines, uInnerLines, vMask);
  float scaledY = blended.y * tileCount;
  float nY = smoothNoise(abs(scaledY));

  float ridge = pow(
    step(abs(nY - blended.x) * 2.0, HALF_PI) * cos(2.0 * (nY - blended.x)),
    5.0
  );

  float lines = 0.0;
  for (float i = 1.0; i < 3.0; i += 1.0) {
    lines += pow(max(fract(scaledY), fract(-scaledY)), i * 2.0);
  }

  float pattern = vMask * lines;

  float cycleT = fullT * uColorCycleSpeed;
  float rChannel = (pattern + lines * ridge) * (cos(blended.y + cycleT * 0.234) * 0.5 + 1.0);
  float gChannel = (pattern + vMask * ridge) * (sin(blended.x + cycleT * 1.745) * 0.5 + 1.0);
  float bChannel = (pattern + lines * ridge) * (cos(blended.x + cycleT * 0.534) * 0.5 + 1.0);

  vec3 col = (rChannel * uColor1 + gChannel * uColor2 + bChannel * uColor3) * uBrightness;
  float alpha = clamp(length(col), 0.0, 1.0);

  gl_FragColor = vec4(col, alpha);
}
`;

const container = document.getElementById('waves-bg');
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const renderer = new Renderer({ alpha: true, premultipliedAlpha: false });
const gl = renderer.gl;
gl.clearColor(0, 0, 0, 0);

let program;
let currentMouse = [0.5, 0.5];
let targetMouse = [0.5, 0.5];

function handleMouseMove(e) {
  const rect = gl.canvas.getBoundingClientRect();
  targetMouse = [
    (e.clientX - rect.left) / rect.width,
    1.0 - (e.clientY - rect.top) / rect.height
  ];
}

function handleMouseLeave() {
  targetMouse = [0.5, 0.5];
}

function resize() {
  renderer.setSize(container.clientWidth, container.clientHeight);
  if (program) {
    program.uniforms.uResolution.value = [gl.canvas.width, gl.canvas.height, gl.canvas.width / gl.canvas.height];
  }
}
window.addEventListener('resize', resize);
resize();

const geometry = new Triangle(gl);
const rotationRad = (config.rotation * Math.PI) / 180;
program = new Program(gl, {
  vertex: vertexShader,
  fragment: fragmentShader,
  uniforms: {
    uTime: { value: 0 },
    uResolution: { value: [gl.canvas.width, gl.canvas.height, gl.canvas.width / gl.canvas.height] },
    uSpeed: { value: config.speed },
    uInnerLines: { value: config.innerLineCount },
    uOuterLines: { value: config.outerLineCount },
    uWarpIntensity: { value: config.warpIntensity },
    uRotation: { value: rotationRad },
    uEdgeFadeWidth: { value: config.edgeFadeWidth },
    uColorCycleSpeed: { value: config.colorCycleSpeed },
    uBrightness: { value: config.brightness },
    uColor1: { value: hexToVec3(config.color1) },
    uColor2: { value: hexToVec3(config.color2) },
    uColor3: { value: hexToVec3(config.color3) },
    uMouse: { value: new Float32Array([0.5, 0.5]) },
    uMouseInfluence: { value: config.mouseInfluence },
    uEnableMouse: { value: config.enableMouseInteraction && !prefersReducedMotion }
  }
});

const mesh = new Mesh(gl, { geometry, program });
container.appendChild(gl.canvas);

if (config.enableMouseInteraction && !prefersReducedMotion) {
  gl.canvas.addEventListener('mousemove', handleMouseMove);
  gl.canvas.addEventListener('mouseleave', handleMouseLeave);
}

let animationFrameId;

function update(time) {
  program.uniforms.uTime.value = time * 0.001;

  if (config.enableMouseInteraction && !prefersReducedMotion) {
    currentMouse[0] += 0.05 * (targetMouse[0] - currentMouse[0]);
    currentMouse[1] += 0.05 * (targetMouse[1] - currentMouse[1]);
    program.uniforms.uMouse.value[0] = currentMouse[0];
    program.uniforms.uMouse.value[1] = currentMouse[1];
  }

  renderer.render({ scene: mesh });

  if (!prefersReducedMotion) {
    animationFrameId = requestAnimationFrame(update);
  }
}

if (prefersReducedMotion) {
  update(0); // render a single static frame, no motion
} else {
  animationFrameId = requestAnimationFrame(update);
}
</script>
</body>
</html>
